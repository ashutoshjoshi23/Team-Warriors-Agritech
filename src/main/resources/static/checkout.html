<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmConnect — Secure Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <!-- Razorpay SDK -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body { background: var(--bg-color); }

        .checkout-page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 50px 24px 80px;
        }

        .checkout-hero {
            text-align: center;
            margin-bottom: 50px;
        }
        .checkout-hero .badge-secure {
            display: inline-flex; align-items: center; gap: 8px;
            background: #D1FAE5; color: #065F46;
            padding: 8px 20px; border-radius: 50px; font-size: 0.85rem; font-weight: 700;
            margin-bottom: 20px;
        }
        [data-theme="dark"] .checkout-hero .badge-secure { background: rgba(16,185,129,0.2); color: #6EE7B7; }
        .checkout-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 4vw, 2.8rem);
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        .checkout-hero p { color: var(--text-secondary); font-size: 1rem; }

        /* Layout */
        .checkout-layout {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 35px;
            align-items: start;
        }

        /* Form Card */
        .form-card {
            background: var(--bg-alt);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
        }
        .form-card h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 28px;
            display: flex; align-items: center; gap: 10px;
            color: var(--text-primary);
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .form-card h2 i { color: var(--primary-color); }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .form-field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 18px; }
        .form-field.full { grid-column: 1 / -1; }
        .form-field label {
            font-weight: 600; font-size: 0.85rem;
            color: var(--text-primary); text-transform: uppercase; letter-spacing: 0.5px;
        }
        .form-field input, .form-field select {
            padding: 13px 16px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-color);
            color: var(--text-primary);
            font-family: inherit; font-size: 0.95rem;
            outline: none; transition: all 0.3s;
        }
        .form-field input:focus, .form-field select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(45,106,79,0.1);
        }

        /* Pay Button */
        .pay-btn {
            width: 100%; padding: 18px;
            font-size: 1.1rem; font-weight: 800;
            background: linear-gradient(135deg, #1B4332, #2D6A4F, #40916C);
            color: white; border: none; border-radius: 16px;
            cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 8px 25px rgba(45,106,79,0.35);
            margin-top: 10px;
        }
        .pay-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(45,106,79,0.45); }
        .pay-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .trust-badges {
            display: flex; gap: 20px; justify-content: center; margin-top: 20px; flex-wrap: wrap;
        }
        .trust-badge {
            display: flex; align-items: center; gap: 6px;
            color: var(--text-secondary); font-size: 0.82rem; font-weight: 600;
        }
        .trust-badge i { color: var(--primary-color); }

        /* Order Summary */
        .summary-card {
            background: var(--bg-alt);
            border-radius: 24px;
            padding: 32px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            position: sticky; top: 80px;
        }
        .summary-card h2 {
            font-size: 1.2rem; font-weight: 700; margin-bottom: 24px;
            display: flex; align-items: center; gap: 10px;
            padding-bottom: 16px; border-bottom: 1px solid var(--border-color);
        }
        .summary-card h2 i { color: var(--primary-color); }

        .order-item {
            display: flex; align-items: center; gap: 14px;
            padding: 12px 0; border-bottom: 1px solid var(--border-color);
        }
        .order-item:last-child { border-bottom: none; }
        .order-item img {
            width: 54px; height: 54px; border-radius: 12px;
            object-fit: cover; border: 2px solid var(--border-color);
            flex-shrink: 0;
        }
        .order-item-info { flex: 1; }
        .order-item-name { font-weight: 600; font-size: 0.95rem; color: var(--text-primary); }
        .order-item-meta { font-size: 0.82rem; color: var(--text-secondary); margin-top: 3px; }
        .order-item-price { font-weight: 700; color: var(--primary-color); font-size: 0.95rem; }

        .summary-totals { margin-top: 20px; }
        .tot-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; color: var(--text-secondary); font-size: 0.95rem;
        }
        .tot-row.grand {
            border-top: 2px solid var(--border-color); margin-top: 10px; padding-top: 16px;
            font-size: 1.2rem; font-weight: 800; color: var(--text-primary);
        }
        .tot-row.grand span:last-child { color: var(--primary-color); }

        .free-shipping-badge {
            background: #D1FAE5; color: #065F46; padding: 3px 10px;
            border-radius: 50px; font-size: 0.78rem; font-weight: 700;
        }
        [data-theme="dark"] .free-shipping-badge { background: rgba(16,185,129,0.2); color: #6EE7B7; }

        /* Step indicators */
        .steps {
            display: flex; align-items: center; justify-content: center;
            gap: 0; margin-bottom: 45px;
        }
        .step {
            display: flex; align-items: center; gap: 8px;
            color: var(--text-secondary); font-size: 0.85rem; font-weight: 600;
        }
        .step.active { color: var(--primary-color); }
        .step .step-num {
            width: 28px; height: 28px; border-radius: 50%;
            border: 2px solid currentColor;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; font-weight: 800;
        }
        .step.active .step-num { background: var(--primary-color); border-color: var(--primary-color); color: white; }
        .step.done .step-num { background: var(--primary-color); border-color: var(--primary-color); color: white; }
        .step-line { width: 60px; height: 2px; background: var(--border-color); margin: 0 10px; }
        .step-line.active { background: var(--primary-color); }

        /* Responsive */
        @media (max-width: 850px) {
            .checkout-layout { grid-template-columns: 1fr; }
            .summary-card { position: static; order: -1; }
            .form-card { padding: 28px 20px; }
        }
        @media (max-width: 500px) {
            .form-row { grid-template-columns: 1fr; }
            .checkout-page { padding: 30px 14px 60px; }
            .trust-badges { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div id="global-loader"><div class="spinner"></div></div>
    <div id="navbar-container"></div>

    <div class="checkout-page">
        <!-- Hero -->
        <div class="checkout-hero animate-up">
            <div class="badge-secure"><i class="fa-solid fa-lock"></i> SSL Secured Checkout</div>
            <h1>Complete Your Order</h1>
            <p>Fill in your details below to confirm your fresh farm produce order</p>
        </div>

        <!-- Steps -->
        <div class="steps animate-up" style="animation-delay:0.1s;">
            <div class="step done">
                <div class="step-num"><i class="fa-solid fa-check" style="font-size:0.7rem;"></i></div>
                <span>Cart</span>
            </div>
            <div class="step-line active"></div>
            <div class="step active">
                <div class="step-num">2</div>
                <span>Checkout</span>
            </div>
            <div class="step-line"></div>
            <div class="step">
                <div class="step-num">3</div>
                <span>Confirmation</span>
            </div>
        </div>

        <!-- Layout -->
        <div class="checkout-layout">
            <!-- LEFT: Form -->
            <div class="animate-up" style="animation-delay:0.15s;">
                <form id="checkoutForm">
                    <div class="form-card">
                        <h2><i class="fa-solid fa-truck-fast"></i> Shipping Information</h2>
                        <div class="form-row">
                            <div class="form-field">
                                <label>Full Name *</label>
                                <input type="text" id="chkName" required placeholder="Aditya Borse">
                            </div>
                            <div class="form-field">
                                <label>Phone Number *</label>
                                <input type="tel" id="chkPhone" required placeholder="+91 98765 43210">
                            </div>
                            <div class="form-field full">
                                <label>Street Address *</label>
                                <input type="text" id="chkAddress" required placeholder="123, MG Road, Apartment 4B">
                            </div>
                            <div class="form-field">
                                <label>City *</label>
                                <input type="text" id="chkCity" required placeholder="Pune">
                            </div>
                            <div class="form-field">
                                <label>State</label>
                                <select id="chkState">
                                    <option value="">Select State</option>
                                    <option>Maharashtra</option>
                                    <option>Gujarat</option>
                                    <option>Karnataka</option>
                                    <option>Delhi</option>
                                    <option>Tamil Nadu</option>
                                    <option>Rajasthan</option>
                                    <option>Uttar Pradesh</option>
                                    <option>West Bengal</option>
                                    <option>Other</option>
                                </select>
                            </div>
                            <div class="form-field">
                                <label>PIN Code *</label>
                                <input type="text" id="chkZip" required placeholder="411001" maxlength="6">
                            </div>
                        </div>
                    </div>

                    <div style="margin-top: 24px;">
                        <button type="submit" id="placeOrderBtn" class="pay-btn">
                            <i class="fa-solid fa-shield-halved"></i>
                            Place Order & Pay Securely
                        </button>
                        <div class="trust-badges">
                            <div class="trust-badge"><i class="fa-solid fa-lock"></i> SSL Encrypted</div>
                            <div class="trust-badge"><i class="fa-solid fa-rotate-left"></i> Easy Returns</div>
                            <div class="trust-badge"><i class="fa-solid fa-headset"></i> 24/7 Support</div>
                        </div>
                    </div>
                </form>
            </div>

            <!-- RIGHT: Order Summary -->
            <div class="animate-up" style="animation-delay:0.2s;">
                <div class="summary-card">
                    <h2><i class="fa-solid fa-receipt"></i> Order Summary</h2>
                    <div id="checkoutItemsList"></div>
                    <div class="summary-totals">
                        <div class="tot-row">
                            <span>Subtotal</span>
                            <span id="chkSubtotal">₹0</span>
                        </div>
                        <div class="tot-row">
                            <span>Delivery</span>
                            <span id="chkShipping"><span class="free-shipping-badge">FREE</span></span>
                        </div>
                        <div class="tot-row">
                            <span>GST (8%)</span>
                            <span id="chkTax">₹0</span>
                        </div>
                        <div class="tot-row grand">
                            <span>Total</span>
                            <span id="chkGrandTotal">₹0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
