<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Marketplace - Dashboard</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div id="global-loader" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--background); display:flex; justify-content:center; align-items:center; z-index:9999;">
        <i class="fa-solid fa-spinner fa-spin fa-3x" style="color:var(--primary);"></i>
    </div>

    <div id="navbar-container"></div>

    <main class="page-container" style="padding-top: 100px; padding-bottom: 60px;">
        <div class="dashboard-header" style="text-align: center; margin-bottom: 40px;">
            <h1 style="color: var(--primary); font-family: 'Playfair Display', serif; font-size: 2.5rem;">Your Dashboard</h1>
            <p id="dashboard-role" style="color: var(--text-muted); font-size: 1.1rem; margin-top: 10px;"></p>
        </div>
        
        <div id="dashboard-content">
            <!-- Dynamically injected via JS -->
        </div>
    </main>

    <div id="footer-container"></div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/main.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
